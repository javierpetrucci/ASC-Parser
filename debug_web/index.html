<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC Debug Renderer</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #222; color: #fff; }
        #dropzone { 
            border: 2px dashed #666; 
            padding: 40px; 
            text-align: center; 
            margin-bottom: 20px; 
            background: #333;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }
        #dropzone.dragover { background: #444; border-color: #aaa; }
        #canvas-container { 
            width: 100%; 
            height: calc(100vh - 180px); 
            overflow: auto; 
            background: #fff; 
            border: 1px solid #444;
            position: relative;
        }
        canvas {
            display: block;
            background: #fff;
            transform-origin: top left;
        }
    </style>
</head>
<body>
    <h1>ASC Parser - Debug Renderer</h1>
    <div id="dropzone">Drag and drop an .asc file here to render</div>
    <div id="canvas-container">
        <canvas id="schematic-canvas"></canvas>
    </div>
    <script src="parser.js"></script>
    <script src="analyzer.js"></script>
    <script src="renderer.js"></script>
    <script src="app.js"></script>
</body>
</html>
