<!DOCTYPE html>
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="margin:0; padding:0;">
<iframe id="pdf-frame" style="width: 100vw; height: 100vh; border: none;"></iframe>
<script>
window.onload = () => {
    const doc = new window.jspdf.jsPDF();
    let y = 20;
    
    // Draw horizontal grid of texts
    const aligns = ['left', 'center', 'right'];
    const baselines = ['top', 'middle', 'bottom'];
    
    baselines.forEach((b, rowIdx) => {
        aligns.forEach((a, colIdx) => {
            const x = 30 + colIdx * 50;
            const curY = y + rowIdx * 40;
            
            // Draw anchor
            doc.setDrawColor(255, 0, 0);
            doc.setFillColor(255, 0, 0);
            doc.rect(x - 1, curY - 1, 2, 2, 'F');
            
            // Draw rotated text
            doc.text('Text', x, curY, { angle: 90, align: a, baseline: b });
            
            // Draw labels
            doc.setFontSize(8);
            doc.text(`${a}, ${b}`, x, curY + 20, { align: 'center' });
            doc.setFontSize(16);
        });
    });
    
    document.getElementById('pdf-frame').src = doc.output('datauristring');
};
</script>
</body>
</html>
