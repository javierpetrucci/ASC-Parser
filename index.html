<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTSpice to PDF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="Assets/UI/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Assets/UI/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="96x96" href="Assets/UI/favicon/favicon-96x96.png">

    <!-- jsPDF loaded for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Shared Engine Scripts -->
    <script src="engine/parser.js"></script>
    <script src="engine/analyzer.js"></script>
    <script src="engine/component_defaults.js"></script>
    <script src="engine/pdf_renderer.js"></script>
    <script src="engine/index.js"></script>

    <!-- Web Interface Script -->
    <script src="app.js" defer></script>
</head>

<body>
    <!-- Global Drag/Drop Overlay -->
    <div id="drop-overlay">
        <div class="drop-message">Drop .asc schematic anywhere to render directly to PDF</div>
    </div>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <img src="Assets/UI/Head.png" alt="LTSpice Renderer Header" class="header-logo">
            </div>

            <div class="menu-area">
                <button id="download-btn" class="primary-btn" disabled>
                    Download PDF
                </button>
            </div>

            <div class="skin-area">
                <label>
                    SKIN PROFILE
                    <select id="skin-selector">
                        <option value="Default">Default</option>
                    </select>
                </label>
            </div>

            <div class="options-area">
                <h3 class="section-title">Render options</h3>
                <label class="checkbox-label">
                    <input type="checkbox" id="opt-canvas-rect">
                    Rectangle based canvas
                    <span class="help-btn"
                        data-tooltip="Determine the canvas size based on a circumscribing rectangle drawn in the schematic.">ⓘ</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="opt-debug-anchors">
                    Text Anchor Point
                    <span class="help-btn"
                        data-tooltip="Display actual text anchor points, for debugging purposes.">ⓘ</span>
                </label>
                <label class=" checkbox-label">
                    <input type="checkbox" id="opt-override-anchors" checked>
                    Override text anchors
                    <span class="help-btn"
                        data-tooltip="Applies optimal visual text positioning, overriding coordinate values from the ASC file for recognized components.">ⓘ</span>
                </label>
            </div>

            <div class="drag-hint">
                <div class="hint-icon">📄</div>
                <p>Drag & drop your .asc</p>
                <input type="file" id="file-input" accept=".asc" style="display: none;">
                <button id="browse-btn" class="secondary-btn">or Browse Files...</button>
            </div>

            <footer class="sidebar-footer">
                <p>Créditos: Santiago López, Javier Petrucci.<br>
                    <a href="https://tc-ii.github.io" target="_blank" class="footer-link">TC-II</a> / ITBA
                </p>
            </footer>
        </aside>

        <!-- Main PDF Viewer Area -->
        <main class="viewer-pane">
            <div id="welcome-msg">
                <div class="landing-icon">⚡</div>
                <h3>Ready to Render</h3>
                <p>Load an LTSpice (.asc) schematic.</p>
            </div>
            <div id="pdf-container">
                <!-- <object id="pdf-viewer" type="application/pdf"> will be injected here -->
            </div>
        </main>
    </div>
</body>

</html>
